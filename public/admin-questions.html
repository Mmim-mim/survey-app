<!doctype html>
<html lang="th">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>จัดการคำถาม</title>

    <link
      href="https://fonts.googleapis.com/css2?family=Noto+Sans+Thai:wght@300;400;500;600;700;800;900&display=swap"
      rel="stylesheet"
    />

    <style>
      :root {
        --red: #8b1515;
        --gold: #c9a34e;
        --card: #ffffff;
        --line: #ead8c8;
        --text: #241414;
        --muted: #7b6b6b;
        --shadow: 0 12px 30px rgba(139, 21, 21, 0.1);
        --radius: 22px;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        font-family: "Noto Sans Thai", sans-serif;
        color: var(--text);
        background:
          radial-gradient(
            circle at top left,
            rgba(139, 21, 21, 0.1),
            transparent 32%
          ),
          radial-gradient(
            circle at top right,
            rgba(201, 163, 78, 0.2),
            transparent 34%
          ),
          linear-gradient(135deg, #fffaf5 0%, #fff1e5 100%);
        min-height: 100vh;
      }

      .sidebar {
        position: fixed;
        top: 0;
        left: -280px;
        width: 280px;
        height: 100vh;
        background: linear-gradient(180deg, #8b1515, #b85b47, #f1d7bd);
        padding: 86px 22px 22px;
        color: white;
        z-index: 2000;
        transition: left 0.28s ease;
        box-shadow: 8px 0 30px rgba(0, 0, 0, 0.18);
      }

      body.sidebar-open .sidebar {
        left: 0;
      }

      body.sidebar-open .sidebar {
        left: 0;
      }

      .brand {
        font-size: 22px;
        font-weight: 900;
        margin-bottom: 24px;
        color: #fff;
      }

      .nav {
        display: grid;
        gap: 10px;
      }

      .nav a {
        display: block;
        color: #fff;
        text-decoration: none;
        padding: 12px 14px;
        border-radius: 14px;
        font-weight: 800;
      }

      .nav a:hover,
      .nav a.active {
        background: rgba(255, 255, 255, 0.18);
      }

      .sidebar-overlay {
        position: fixed;
        inset: 0;
        background: rgba(0, 0, 0, 0.38);
        display: none;
        z-index: 1500;
      }

      body.sidebar-open .sidebar-overlay {
        display: block;
      }

      .hamburger {
        position: fixed;
        top: 20px;
        left: 20px;
        z-index: 2100;
        width: 46px;
        height: 46px;
        border: 1px solid #ead8c8;
        border-radius: 14px;
        background: #fff;
        color: #8b1515;
        font-size: 24px;
        font-weight: 900;
        cursor: pointer;
        box-shadow: 0 10px 24px rgba(139, 21, 21, 0.16);
      }

      .page {
        padding: 28px 42px 42px;
        max-width: 1300px;
        margin: 0 auto;
        width: 100%;
        transition:
          margin-left 0.28s ease,
          width 0.28s ease;
      }

      body.sidebar-open .page {
        margin-left: 280px;
        width: calc(100% - 280px);
      }
      .header {
        display: flex;
        justify-content: space-between;
        align-items: flex-start;
        gap: 16px;
        margin-bottom: 18px;
      }

      h1 {
        margin: 0;
        color: var(--red);
        font-size: 34px;
        font-weight: 900;
      }

      .sub {
        color: var(--muted);
        margin-top: 6px;
        font-weight: 600;
      }

      .panel {
        background: var(--card);
        border: 1px solid var(--line);
        border-radius: var(--radius);
        box-shadow: var(--shadow);
        padding: 18px;
        margin-bottom: 16px;
      }

      .panel-head {
        display: flex;
        justify-content: space-between;
        align-items: center;
        gap: 12px;
        margin-bottom: 14px;
      }

      .panel h2 {
        margin: 0;
        color: var(--red);
        font-size: 20px;
        font-weight: 900;
      }

      .form-grid {
        display: grid;
        grid-template-columns: 1fr 280px 180px 150px 120px;
        gap: 10px;
        align-items: start;
      }

      .form-grid > div {
        display: flex;
        flex-direction: column;
        justify-content: flex-start;
      }

      .form-grid label {
        height: 20px;
        display: flex;
        align-items: center;
      }

      label {
        display: block;
        color: var(--muted);
        font-size: 13px;
        font-weight: 800;
        margin-bottom: 6px;
      }

      input,
      select,
      textarea {
        width: 100%;
        border: 1px solid #e2c8b5;
        border-radius: 14px;
        padding: 0 12px;
        background: white;
        font: inherit;
        outline: none;
      }

      input,
      select {
        height: 44px;
      }

      textarea {
        height: 44px;
        min-height: 44px;
        padding: 11px 12px 0;
        resize: none;
        overflow: hidden;
        line-height: 20px;
      }

      input:focus,
      select:focus,
      textarea:focus {
        border-color: var(--gold);
        box-shadow: 0 0 0 4px rgba(201, 163, 78, 0.22);
      }

      .btn {
        border: 1px solid var(--line);
        background: #fff;
        color: var(--red);
        border-radius: 14px;
        padding: 10px 14px;
        font-weight: 900;
        cursor: pointer;
        text-decoration: none;
        font-family: inherit;
        min-height: 44px;
      }

      .btn.primary {
        background: linear-gradient(90deg, var(--red), var(--gold));
        color: white;
        border-color: transparent;
        height: 44px;
        white-space: nowrap;
      }

      .btn.danger {
        color: #b91c1c;
        border-color: #fecaca;
        background: #fff5f5;
      }

      .table-wrap {
        overflow: auto;
        border: 1px solid #f0dfd0;
        border-radius: 16px;
      }

      table {
        width: 100%;
        min-width: 920px;
        border-collapse: collapse;
      }

      th,
      td {
        padding: 12px 14px;
        border-bottom: 1px solid #f0dfd0;
        text-align: left;
        font-size: 14px;
        vertical-align: top;
      }

      th {
        background: #fff1e6;
        color: var(--red);
        font-weight: 900;
      }

      td {
        background: #fffdf9;
      }

      .badge {
        display: inline-block;
        padding: 5px 10px;
        border-radius: 999px;
        font-size: 12px;
        font-weight: 900;
        background: #fff1e6;
        color: var(--red);
      }

      .badge.rating {
        background: #dcfce7;
        color: #15803d;
      }

      .badge.textarea {
        background: #e0f2fe;
        color: #0369a1;
      }

      .badge.text {
        background: #f3e8ff;
        color: #7e22ce;
      }

      .empty {
        color: var(--muted);
        text-align: center;
        padding: 24px;
      }

      .bulk-actions {
        display: flex;
        justify-content: flex-end;
        margin: 0 0 10px;
      }

      .bulk-actions .btn.danger {
        min-width: 120px;
      }

      .question-check,
      #checkAllQuestions {
        width: 16px;
        height: 16px;
        accent-color: var(--red);
        cursor: pointer;
      }

      @media (max-width: 1100px) {
        .page {
          padding: 84px 18px 28px;
        }

        .form-grid {
          grid-template-columns: 1fr;
        }
      }

      .question-filter-bar {
        display: grid;
        grid-template-columns: 1fr 240px;
        gap: 14px;
        margin: 8px 0 18px;
        padding: 14px;
        border: 1px solid #ead8c8;
        border-radius: 16px;
        background: #fffaf4;
      }

      .question-layout {
        display: grid;
        grid-template-columns: 260px minmax(0, 1fr);
        gap: 14px;
        align-items: start;
      }

      .question-content {
        width: 100%;
        min-width: 0;
      }

      .category-panel {
        border: 1px solid #f0dfd0;
        border-radius: 16px;
        background: #fffaf4;
        padding: 12px;
      }

      .category-title {
        color: var(--red);
        font-weight: 900;
        margin-bottom: 10px;
      }

      .category-list {
        display: grid;
        gap: 8px;
      }

      .category-btn {
        width: 100%;
        border: 1px solid #ead8c8;
        background: #fff;
        border-radius: 12px;
        padding: 10px 12px;
        cursor: pointer;
        font-family: inherit;
        font-weight: 800;
        color: #7a1414;
        display: flex;
        justify-content: space-between;
        align-items: center;
      }

      .category-btn.active {
        background: #fff1e6;
        border-color: #c9a34e;
        box-shadow: 0 0 0 3px rgba(201, 163, 78, 0.18);
      }

      .category-count {
        background: #fff;
        border: 1px solid #ead8c8;
        border-radius: 999px;
        padding: 2px 8px;
        color: #7b6b6b;
        font-size: 12px;
      }

      .bulk-actions {
        display: flex;
        justify-content: flex-end;
        margin: 0 0 10px;
      }

      .bulk-actions .btn.danger {
        min-width: 120px;
      }

      .question-check,
      #checkAllQuestions {
        width: 16px;
        height: 16px;
        accent-color: var(--red);
        cursor: pointer;
      }

      .question-content .table-wrap {
        width: 100%;
        max-width: 100%;
        overflow-x: auto;
      }

      .question-content table {
        width: 100%;
        min-width: 920px;
      }

      @media (max-width: 900px) {
        .question-layout {
          grid-template-columns: 1fr;
        }
      }

      .question-filter-bar label {
        color: var(--muted);
        font-size: 13px;
        font-weight: 800;
        margin-bottom: 6px;
      }

      @media (max-width: 768px) {
        .question-filter-bar {
          grid-template-columns: 1fr;
        }
      }
    </style>
    <link rel="stylesheet" href="global.css" />
  </head>

  <body>
    <button class="hamburger" id="hamburgerBtn" type="button">☰</button>
    <div class="sidebar-overlay" id="sidebarOverlay"></div>

    <aside class="sidebar" id="sidebar">
      <div class="brand">👑 Admin</div>
      <nav class="nav">
        <a href="admin.html">Dashboard</a>
        <a href="admin-users.html">จัดการผู้ใช้</a>
        <a href="admin-forms.html">จัดการฟอร์ม</a>
        <a href="admin-questions.html" class="active">จัดการคำถาม</a>
        <a href="login.html">ออกจากระบบ</a>
      </nav>
    </aside>

    <main class="page">
      <div class="header">
        <div>
          <h1>📝 จัดการคำถาม</h1>
          <div class="sub">สร้างและจัดการคำถามกลางสำหรับนำไปใช้ในแบบฟอร์ม</div>
        </div>
      </div>

      <section class="panel">
        <div class="panel-head">
          <h2>เพิ่มคำถามกลาง</h2>
        </div>

        <div class="form-grid">
          <div>
            <label>คำถาม</label>
            <textarea
              id="questionInput"
              placeholder="พิมพ์คำถามกลาง..."
            ></textarea>
          </div>

          <div>
            <label>เลือก Group จาก Admin Structure</label>
            <select id="groupInput">
              <option value="">-- เลือก Group --</option>
            </select>
          </div>

          <div>
            <label>ประเภทคำถาม</label>
            <select id="typeInput">
              <option value="rating">rating</option>
              <option value="textarea">
                textarea (กล่องข้อความหลายบรรทัด)
              </option>
              <option value="text">text (ข้อความบรรทัดเดียว)</option>
            </select>
          </div>

          <div>
            <label>ลำดับ</label>
            <input id="sortInput" type="number" value="0" />
          </div>

          <div>
            <label>สถานะ</label>
            <select id="statusInput">
              <option value="active">เปิดใช้งาน</option>
              <option value="inactive">ปิดใช้งาน</option>
            </select>
          </div>

          <div>
            <label>&nbsp;</label>
            <button class="btn primary" id="btnAddQuestion" style="width: 100%">
              เพิ่มคำถาม
            </button>
          </div>
        </div>
      </section>

      <section class="panel">
        <div class="panel-head">
          <h2>รายการคำถามกลาง</h2>
          <button class="btn" id="btnClearDemo">ล้างข้อมูลตัวอย่าง</button>
        </div>

        <div class="question-filter-bar">
          <div>
            <label>ค้นหาคำถาม</label>
            <input
              type="text"
              id="searchQuestionInput"
              placeholder="🔍 ค้นหาคำถาม..."
            />
          </div>

          <div>
            <label>เรียงลำดับ</label>
            <select id="sortQuestionSelect">
              <option value="newest">ล่าสุดก่อน</option>
              <option value="oldest">เก่าสุดก่อน</option>
              <option value="az">คำถาม A-Z</option>
              <option value="za">คำถาม Z-A</option>
            </select>
          </div>
        </div>

        <div class="question-layout">
          <aside class="category-panel">
            <div class="category-title">หมวดหมู่ทั้งหมด</div>
            <div class="category-list" id="categoryList"></div>
          </aside>

          <div class="question-content">
            <div class="bulk-actions">
              <button class="btn danger" id="btnDeleteSelected" type="button">
                ลบที่เลือก
              </button>
            </div>

            <div class="table-wrap">
              <table>
                <thead>
                  <tr>
                    <th style="width: 52px">
                      <input
                        type="checkbox"
                        id="checkAllQuestions"
                        title="เลือกทั้งหมด"
                      />
                    </th>
                    <th style="width: 70px">ลำดับ</th>
                    <th>คำถาม</th>
                    <th style="width: 260px">Group</th>
                    <th style="width: 130px">ประเภท</th>
                    <th style="width: 130px">สถานะ</th>
                    <th style="width: 100px">Action</th>
                  </tr>
                </thead>

                <tbody id="questionTableBody">
                  <tr>
                    <td colspan="7" class="empty">ยังไม่มีคำถามกลาง</td>
                  </tr>
                </tbody>
              </table>
            </div>
          </div>
        </div>
      </section>
    </main>

    <script>
      document.body.classList.remove("sidebar-open");

      const hamburgerBtn = document.getElementById("hamburgerBtn");
      const sidebarOverlay = document.getElementById("sidebarOverlay");

      hamburgerBtn.addEventListener("click", () => {
        document.body.classList.toggle("sidebar-open");
      });

      sidebarOverlay.addEventListener("click", () => {
        document.body.classList.remove("sidebar-open");
      });

      document.querySelectorAll(".sidebar a").forEach((link) => {
        link.addEventListener("click", () => {
          document.body.classList.remove("sidebar-open");
        });
      });

      document.addEventListener("keydown", (e) => {
        if (e.key === "Escape") {
          document.body.classList.remove("sidebar-open");
        }
      });
    </script>

    <script>
      const currentUser = JSON.parse(
        localStorage.getItem("currentUser") || "{}",
      );
      const role = currentUser.role || "admin";

      const questionInput = document.getElementById("questionInput");
      const groupInput = document.getElementById("groupInput");
      const typeInput = document.getElementById("typeInput");
      const statusInput = document.getElementById("statusInput");
      const sortInput = document.getElementById("sortInput");
      const btnAddQuestion = document.getElementById("btnAddQuestion");

      const questionTableBody = document.getElementById("questionTableBody");
      const categoryList = document.getElementById("categoryList");
      const searchQuestionInput = document.getElementById(
        "searchQuestionInput",
      );
      const sortQuestionSelect = document.getElementById("sortQuestionSelect");
      const checkAllQuestions = document.getElementById("checkAllQuestions");
      const btnDeleteSelected = document.getElementById("btnDeleteSelected");
      const btnClearDemo = document.getElementById("btnClearDemo");

      let groups = [];
      let questions = [];
      let selectedGroupFilter = "all";

      function esc(text) {
        return String(text || "")
          .replaceAll("&", "&amp;")
          .replaceAll("<", "&lt;")
          .replaceAll(">", "&gt;")
          .replaceAll('"', "&quot;");
      }

      async function api(path, options = {}) {
        const url = path.includes("?")
          ? `${path}&role=${encodeURIComponent(role)}`
          : `${path}?role=${encodeURIComponent(role)}`;

        const res = await fetch(url, {
          headers: {
            "Content-Type": "application/json",
            ...(options.headers || {}),
          },
          ...options,
        });

        const json = await res.json().catch(() => ({}));

        if (!res.ok) {
          throw new Error(json.error || "เกิดข้อผิดพลาด");
        }

        return json;
      }

      async function loadGroups() {
        groups = await api("/api/admin/question-groups");

        groupInput.innerHTML = `
      <option value="">-- เลือก Group --</option>
      ${groups
        .map(
          (g) => `
            <option value="${g.group_id}">
              ${esc(g.category_title)} > ${esc(g.group_title)}
            </option>
          `,
        )
        .join("")}
    `;
      }

      async function loadQuestions() {
        questions = await api("/api/admin/questions");
        renderCategoryList();
        renderQuestions();
      }

      function renderCategoryList() {
        const counts = new Map();

        questions.forEach((q) => {
          const key = q.group_id || "none";
          counts.set(key, (counts.get(key) || 0) + 1);
        });

        categoryList.innerHTML = `
      <button class="category-btn ${selectedGroupFilter === "all" ? "active" : ""}" data-group-filter="all">
        <span>ทั้งหมด</span>
        <span class="category-count">${questions.length}</span>
      </button>

      ${groups
        .map((g) => {
          const count = counts.get(g.group_id) || 0;
          const active =
            String(selectedGroupFilter) === String(g.group_id) ? "active" : "";

          return `
            <button class="category-btn ${active}" data-group-filter="${g.group_id}">
              <span>${esc(g.group_title)}</span>
              <span class="category-count">${count}</span>
            </button>
          `;
        })
        .join("")}
    `;

        categoryList.querySelectorAll(".category-btn").forEach((btn) => {
          btn.addEventListener("click", () => {
            selectedGroupFilter = btn.dataset.groupFilter;
            renderCategoryList();
            renderQuestions();
          });
        });
      }

      function getFilteredQuestions() {
        const keyword = String(searchQuestionInput.value || "")
          .trim()
          .toLowerCase();

        let rows = [...questions];

        if (selectedGroupFilter !== "all") {
          rows = rows.filter(
            (q) => String(q.group_id) === String(selectedGroupFilter),
          );
        }

        if (keyword) {
          rows = rows.filter((q) =>
            String(q.question_text || "")
              .toLowerCase()
              .includes(keyword),
          );
        }

        const sort = sortQuestionSelect.value;

        if (sort === "oldest") {
          rows.sort((a, b) => Number(a.id) - Number(b.id));
        } else if (sort === "az") {
          rows.sort((a, b) =>
            String(a.question_text || "").localeCompare(
              String(b.question_text || ""),
              "th",
            ),
          );
        } else if (sort === "za") {
          rows.sort((a, b) =>
            String(b.question_text || "").localeCompare(
              String(a.question_text || ""),
              "th",
            ),
          );
        } else {
          rows.sort((a, b) => Number(b.id) - Number(a.id));
        }

        return rows;
      }

      function renderQuestions() {
        const rows = getFilteredQuestions();

        if (!rows.length) {
          questionTableBody.innerHTML = `
        <tr>
          <td colspan="7" class="empty">ยังไม่มีคำถามกลาง</td>
        </tr>
      `;
          return;
        }

        questionTableBody.innerHTML = rows
          .map(
            (q, index) => `
          <tr>
            <td>
              <input class="question-check" type="checkbox" value="${q.id}" />
            </td>
            <td>${index + 1}</td>
            <td>${esc(q.question_text)}</td>
            <td>
              <div style="font-weight:900;color:#7a1414">
                ${esc(q.category_title || q.category || "-")}
              </div>
              <div style="color:#7b6b6b;font-size:13px">
                ${esc(q.group_title || q.used_in_label || "-")}
              </div>
            </td>
            <td>
              <span class="badge ${esc(q.question_type)}">
                ${esc(q.question_type)}
              </span>
            </td>
            <td>
              ${q.status === "active" ? "เปิดใช้งาน" : "ปิดใช้งาน"}
            </td>
            <td>
              <button class="btn danger btn-delete-one" data-id="${q.id}" type="button">
                ลบ
              </button>
            </td>
          </tr>
        `,
          )
          .join("");

        document.querySelectorAll(".btn-delete-one").forEach((btn) => {
          btn.addEventListener("click", async () => {
            const id = btn.dataset.id;
            const ok = confirm("ยืนยันลบคำถามนี้หรือไม่?");
            if (!ok) return;

            await api(`/api/admin/questions/${id}`, { method: "DELETE" });
            await loadQuestions();
          });
        });

        checkAllQuestions.checked = false;
      }

      async function addQuestion() {
        const payload = {
          group_id: Number(groupInput.value),
          question_text: questionInput.value.trim(),
          question_type: typeInput.value,
          status: statusInput.value,
          sort_order: Number(sortInput.value || 0),
        };

        if (!payload.group_id) {
          alert("กรุณาเลือก Group");
          return;
        }

        if (!payload.question_text) {
          alert("กรุณากรอกคำถาม");
          return;
        }

        await api("/api/admin/questions", {
          method: "POST",
          body: JSON.stringify(payload),
        });

        questionInput.value = "";
        sortInput.value = "0";
        await loadQuestions();

        alert("เพิ่มคำถามเรียบร้อย");
      }

      btnAddQuestion.addEventListener("click", addQuestion);

      searchQuestionInput.addEventListener("input", renderQuestions);
      sortQuestionSelect.addEventListener("change", renderQuestions);

      checkAllQuestions.addEventListener("change", () => {
        document.querySelectorAll(".question-check").forEach((cb) => {
          cb.checked = checkAllQuestions.checked;
        });
      });

      btnDeleteSelected.addEventListener("click", async () => {
        const ids = Array.from(
          document.querySelectorAll(".question-check:checked"),
        )
          .map((cb) => cb.value)
          .filter(Boolean);

        if (!ids.length) {
          alert("กรุณาเลือกคำถามที่ต้องการลบ");
          return;
        }

        const ok = confirm(`ยืนยันลบคำถามที่เลือก ${ids.length} ข้อหรือไม่?`);
        if (!ok) return;

        for (const id of ids) {
          await api(`/api/admin/questions/${id}`, { method: "DELETE" });
        }

        await loadQuestions();
      });

      if (btnClearDemo) {
        btnClearDemo.addEventListener("click", () => {
          alert(
            "ตอนนี้ปุ่มนี้ยังไม่ใช้งาน เพราะข้อมูลถูกจัดการผ่านฐานข้อมูลจริงแล้ว",
          );
        });
      }

      (async function init() {
        try {
          await loadGroups();
          await loadQuestions();
        } catch (err) {
          console.error(err);
          alert(err.message || "โหลดข้อมูลไม่สำเร็จ");
        }
      })();
    </script>
  </body>
</html>
