<!doctype html>
<html lang="th">
  <head>
    <meta charset="utf-8" />
    <title>จัดการโครงสร้างแบบประเมิน</title>
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <link rel="stylesheet" href="global.css" />

    <style>
      body {
        font-family: "Noto Sans Thai", system-ui, sans-serif;
        margin: 0;
        background: linear-gradient(135deg, #fff8f2, #fff1e6);
        color: #2a1a1a;
        padding: 28px;
      }

      .page {
        max-width: 1180px;
        margin: 0 auto;
      }

      .topbar {
        display: flex;
        justify-content: space-between;
        align-items: center;
        margin-bottom: 24px;
      }

      h1 {
        color: #8b1414;
        margin: 0;
        font-size: 34px;
      }

      .subtitle {
        color: #7a5c5c;
        margin-top: 6px;
        font-weight: 600;
      }

      .btn {
        border: 0;
        border-radius: 12px;
        padding: 12px 18px;
        cursor: pointer;
        font-weight: 800;
        background: #fff;
        border: 1px solid #ead8c8;
      }

      .btn.primary {
        background: linear-gradient(90deg, #9b1c1c, #c9a34e);
        color: white;
      }

      .layout {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 18px;
      }

      .card {
        background: white;
        border: 1px solid #ead8c8;
        border-radius: 18px;
        padding: 22px;
        box-shadow: 0 10px 28px rgba(155, 28, 28, 0.08);
      }

      .category-item {
        display: grid;
        grid-template-columns: 42px 1fr auto;
        align-items: center;
        gap: 12px;
        border: 1px solid #ead8c8;
        border-radius: 14px;
        padding: 14px;
        margin-bottom: 10px;
        background: #fffaf4;
        cursor: pointer;
      }

      .category-item.active {
        border-color: #c9a34e;
        box-shadow: 0 0 0 4px rgba(201, 163, 78, 0.18);
      }

      .badge {
        width: 32px;
        height: 32px;
        border-radius: 50%;
        background: #9b1c1c;
        color: white;
        display: grid;
        place-items: center;
        font-weight: 900;
      }

      .title {
        font-weight: 900;
        color: #7a1414;
      }

      .muted {
        color: #7a5c5c;
        font-size: 14px;
      }

      .actions {
        display: flex;
        gap: 8px;
      }

      .icon-btn {
        border: 0;
        background: #fff;
        cursor: pointer;
        font-size: 18px;
        padding: 6px;
        border-radius: 8px;
      }

      .icon-btn:hover {
        background: #fff1e6;
      }

      label {
        display: block;
        font-weight: 800;
        margin: 14px 0 8px;
        color: #7a1414;
      }

      input,
      textarea,
      select {
        width: 100%;
        border: 1px solid #e0c6b5;
        border-radius: 12px;
        padding: 12px 14px;
        font-size: 16px;
        box-sizing: border-box;
        font-family: inherit;
      }

      textarea {
        min-height: 90px;
        resize: vertical;
      }

      .form-actions {
        display: flex;
        justify-content: flex-end;
        gap: 10px;
        margin-top: 18px;
      }

      @media (max-width: 850px) {
        .layout {
          grid-template-columns: 1fr;
        }
      }

      .structure-item {
        border: 1px solid #ead8c8;
        border-radius: 14px;
        margin-bottom: 10px;
        overflow: hidden;
        background: #fffaf4;
      }

      .structure-head {
        display: grid;
        grid-template-columns: 42px 1fr auto;
        align-items: center;
        gap: 12px;
        padding: 14px;
        cursor: pointer;
      }

      .structure-head.active {
        border-color: #c9a34e;
        box-shadow: 0 0 0 4px rgba(201, 163, 78, 0.16);
      }

      .structure-child-list {
        padding: 0 14px 14px 68px;
        display: none;
      }

      .structure-item.open .structure-child-list {
        display: grid;
        gap: 8px;
      }

      .child-item {
        padding: 10px 12px;
        border: 1px solid #ead8c8;
        border-radius: 12px;
        background: #fff;
        cursor: pointer;
        display: flex;
        justify-content: space-between;
        align-items: center;
      }

      .child-item:hover,
      .child-item.active {
        border-color: #c9a34e;
        background: #fff7ec;
      }

      .child-title {
        font-weight: 800;
        color: #8b1515;
      }

      .child-muted {
        font-size: 13px;
        color: #7a5c5c;
      }

      .structure-child-list {
        margin-left: 46px;
        padding: 10px 0 12px 18px;
        border-left: 2px dashed #ead8c8;
        display: none;
      }

      .structure-item.open .structure-child-list {
        display: grid;
        gap: 10px;
      }

      .child-item {
        position: relative;
        padding: 12px 14px;
        border: 1px solid #ead8c8;
        border-radius: 12px;
        background: #fffdf9;
        cursor: pointer;
        display: flex;
        justify-content: space-between;
        align-items: center;
      }

      .child-item::before {
        content: "";
        position: absolute;
        left: -18px;
        top: 50%;
        width: 16px;
        border-top: 2px dashed #ead8c8;
      }

      .child-item:hover,
      .child-item.active {
        border-color: #c9a34e;
        background: #fff7ec;
      }

      .expand-btn {
        font-size: 16px;
        font-weight: 900;
        color: #8b1515;
      }

      .icon-btn {
        font-size: 16px;
      }

      /* ปรับ Tree View ให้ดูโปรขึ้น */
      .structure-head {
        transition: 0.18s ease;
      }

      .structure-head:hover {
        background: #fff7ec;
      }

      .structure-child-list {
        margin-left: 46px;
        padding: 10px 0 12px 18px;
        border-left: 2px dashed #ead8c8;
        display: none;
        animation: treeSlideDown 0.18s ease;
      }

      .structure-item.open .structure-child-list {
        display: grid;
        gap: 8px;
      }

      .child-item {
        position: relative;
        min-height: 48px;
        padding: 9px 12px;
        border: 1px solid #ead8c8;
        border-radius: 12px;
        background: #fffdf9;
        cursor: pointer;
        display: flex;
        justify-content: space-between;
        align-items: center;
        transition: 0.18s ease;
      }

      .child-item::before {
        content: "";
        position: absolute;
        left: -18px;
        top: 50%;
        width: 16px;
        border-top: 2px dashed #ead8c8;
      }

      .child-item:hover,
      .child-item.active {
        border-color: #c9a34e;
        background: #fff7ec;
      }

      .child-title {
        font-size: 16px;
        font-weight: 900;
        color: #8b1515;
      }

      .child-muted {
        font-size: 12px;
        color: #7a5c5c;
      }

      .expand-btn {
        width: 34px;
        height: 34px;
        padding: 0;
        font-size: 15px;
        font-weight: 900;
        color: #8b1515;
      }

      .edit-section-btn,
      .child-edit-icon {
        display: none;
      }

      @keyframes treeSlideDown {
        from {
          opacity: 0;
          transform: translateY(-4px);
        }
        to {
          opacity: 1;
          transform: translateY(0);
        }
      }

      .group-list {
        margin-top: 8px;
        display: grid;
        gap: 6px;
        padding-left: 18px;
        border-left: 2px solid #f0dfd0;
      }

      .group-item {
        padding: 8px 10px;
        border-radius: 10px;
        background: #fff8f2;
        border: 1px solid #f0dfd0;
        cursor: pointer;
      }

      .group-item:hover,
      .group-item.active {
        border-color: #c9a34e;
        background: #fff1e6;
      }

      .group-title {
        font-size: 14px;
        font-weight: 800;
        color: #7a1414;
      }

      .cat-toggle {
        border: 0;
        background: #fff8f2;
        color: #8b1515;
        font-weight: 900;
        cursor: pointer;
        border-radius: 8px;
        padding: 4px 8px;
        margin-right: 6px;
      }

      .group-list {
        display: none;
        margin-top: 8px;
        padding-left: 22px;
        border-left: 2px dashed #ead8c8;
      }

      .child-item.open .group-list {
        display: grid;
        gap: 6px;
      }

      .group-item {
        padding: 8px 10px;
        border-radius: 10px;
        background: #fff8f2;
        border: 1px solid #f0dfd0;
        cursor: pointer;
      }

      .group-item:hover,
      .group-item.active {
        border-color: #c9a34e;
        background: #fff1e6;
      }

      .group-title {
        font-size: 14px;
        font-weight: 800;
        color: #7a1414;
      }
    </style>
  </head>

  <body>
    <div class="page">
      <div class="topbar">
        <div>
          <h1>จัดการส่วนหลักของแบบประเมิน</h1>
          <div class="subtitle">
            จัดการ 5 ส่วนหลัก เช่น ข้อมูลผู้ประเมิน, คำถาม, ข้อเสนอแนะ
          </div>
        </div>

        <div style="display: flex; gap: 10px; flex-wrap: wrap">
          <button class="btn primary" id="btnNew">+ เพิ่มส่วนหลัก</button>
          <button class="btn" id="btnNewGroup">+ เพิ่มกลุ่มคำถาม</button>
        </div>
      </div>

      <div class="layout">
        <div class="card">
          <h2>โครงสร้างแบบประเมิน</h2>
          <div id="structureList"></div>
        </div>

        <div class="card">
          <h2 id="formTitle">รายละเอียดส่วนหลัก</h2>

          <input type="hidden" id="categoryId" />
          <input type="hidden" id="parentCategoryId" />

          <label>ชื่อหัวข้อใหญ่</label>
          <input id="titleInput" placeholder="เช่น LibQUAL+" />

          <label>คำอธิบาย</label>
          <textarea id="descInput" placeholder="คำอธิบายหัวข้อใหญ่"></textarea>

          <label>ลำดับ</label>
          <input id="sortInput" type="number" value="0" />

          <label>สถานะ</label>
          <select id="activeInput">
            <option value="1">เปิดใช้งาน</option>
            <option value="0">ปิดใช้งาน</option>
          </select>

          <div class="form-actions">
            <button class="btn" id="btnCancel">ล้างฟอร์ม</button>
            <button class="btn primary" id="btnSave">บันทึกข้อมูล</button>
          </div>
        </div>
      </div>
    </div>

    <script src="admin-structure.js"></script>
  </body>
</html>
