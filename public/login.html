<!doctype html>
<html lang="th">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>login</title>
    <style>
      :root {
        --bg: #fff8f2;
        --card: #ffffff;
        --input: #ead8c8;
      }
      * {
        box-sizing: border-box;
        font-family:
          system-ui,
          -apple-system,
          Segoe UI,
          Roboto,
          Arial,
          sans-serif;
      }
      html,
      body {
        height: 100%;
      }
      body {
        margin: 0;
        background: var(--bg);
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 24px;
      }
      .card {
        width: min(920px, 92vw);
        height: min(360px, 80vh);
        background: var(--card);
        border-radius: 2px;
        display: grid;
        place-items: center;
        position: relative;
      }
      .corner {
        position: absolute;
        left: 12px;
        top: 8px;
        color: #bcbcbc;
        font-size: 12px;
      }
      .wrap {
        width: 520px;
        max-width: 90%;
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 14px;
      }
      h1 {
        margin: 0 0 8px;
        font-weight: 500;
        font-size: 48px;
        color: #000;
      }
      .field {
        width: 240px;
        padding: 10px 14px;
        border: none;
        outline: none;
        background: var(--input);
        color: var(--on);
        border-radius: 8px;
        font-size: 14px;
      }
      ::placeholder {
        color: var(--on);
        opacity: 0.95;
      }
      .btn {
        padding: 6px 16px;
        font-size: 12px;
        border: none;
        outline: none;
        cursor: pointer;
        background: linear-gradient(90deg, #9b1c1c, #c9a34e);
        color: #fff;
        border-radius: 6px;
      }
      .error {
        min-height: 16px;
        font-size: 12px;
        color: #c62828;
      }
    </style>
  </head>
  <body>
    <div class="card">
      <div class="corner">login</div>

      <form class="wrap" id="loginForm">
        <h1>Survey</h1>
        <input
          class="field"
          type="text"
          id="username"
          placeholder="username"
          required
        />
        <input
          class="field"
          type="password"
          id="password"
          placeholder="password"
          required
        />
        <button class="btn" type="submit">login</button>
        <div class="error" id="err"></div>
      </form>
    </div>

    <script>
      const form = document.getElementById("loginForm");
      const err = document.getElementById("err");

      form.addEventListener("submit", async (e) => {
        e.preventDefault();
        err.textContent = "";

        const u = document.getElementById("username").value.trim();
        const p = document.getElementById("password").value;

        try {
          const resp = await fetch("/api/login", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ username: u, password: p }),
          });

          const data = await resp.json().catch(() => ({}));

          if (!resp.ok || !data.ok) {
            err.textContent =
              data && data.error ? data.error : "Invalid username or password";
            return;
          }

          // ล็อกอินสำเร็จ
          localStorage.setItem("isLoggedIn", "1");
          localStorage.setItem("user", data.user?.username || u);
          localStorage.setItem("displayName", data.user?.display_name || "");
          localStorage.setItem("role", data.user?.role || "staff");

          // ไปหน้า index
          window.location.href = "index.html";
        } catch (e2) {
          err.textContent = "Server error: " + e2.message;
        }
      });
    </script>
  </body>
</html>
